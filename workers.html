<!DOCTYPE html>
<html>
<head>
  <title>Workers - Rust Massage</title>

  <meta name="theme-color" content="#0f172a">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    header{
      background:#111827;
      padding:20px;
      font-size:20px;
      font-weight:bold;
    }

    #display{
      font-size:40px;
      margin:40px auto;
      padding:20px;
      background:#1e293b;
      border-radius:15px;
      min-height:120px;
      width:80%;
    }

    .glow{
      box-shadow:0 0 20px #22c55e;
      transition:0.3s;
    }

    button{
      padding:12px 18px;
      margin:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
    }

    #startBtn{ background:#3b82f6; color:white; }
    #approvedBtn{ background:#22c55e; color:white; display:none; }
    #refreshBtn{ background:#f59e0b; color:black; }
  </style>
</head>

<body>

<header>
  Rust Sports Massage Al Safa - Workers Panel 🔔
</header>

<button id="startBtn">Enable Sound 🔊</button>
<button id="refreshBtn" onclick="location.reload()">Refresh 🔄</button>

<div id="display">Waiting for orders...</div>

<button id="approvedBtn">Approved ✔</button>

<audio id="ring" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" loop></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
try {

const firebaseConfig = {
  apiKey: "AIzaSyDxSa9SEtAB8cfw8W2r0Mt_XBXUJSn1II",
  authDomain: "worker-me.firebaseapp.com",
  databaseURL: "https://worker-me-default-rtdb.firebaseio.com",
  projectId: "worker-me",
  storageBucket: "worker-me.firebasestorage.app",
  messagingSenderId: "84141160865",
  appId: "1:84141160865:web:bdf89dba7e6244339973e0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ring = document.getElementById("ring");
let soundEnabled = false;
let currentKey = null;
let stopTimeout;

// 🔔 تفعيل الصوت
document.getElementById("startBtn").onclick = async () => {
  try {
    await ring.play();
    ring.pause();
    ring.currentTime = 0;
    soundEnabled = true;
    document.getElementById("startBtn").style.display = "none";
  } catch(e) {
    alert("Sound blocked - click again");
  }
};

// 🔥 استقبال الطلب
db.ref("orders").limitToLast(1).on("child_added", (snap) => {
  let data = snap.val();
  if(!data) return;

  currentKey = snap.key;

  if(data.status === "cleared") return;

  showOrder(data.text);
});

// 🟢 عرض الطلب
function showOrder(text){
  let box = document.getElementById("display");

  box.innerText = text;
  box.classList.add("glow");

  document.getElementById("approvedBtn").style.display = "inline-block";

  if(soundEnabled){
    ring.currentTime = 0;
    ring.play();
  }

  clearTimeout(stopTimeout);
  stopTimeout = setTimeout(stopAlarm, 20000);
}

// 🟢 Approved
document.getElementById("approvedBtn").onclick = stopAlarm;

function stopAlarm(){
  ring.pause();
  ring.currentTime = 0;

  document.getElementById("approvedBtn").style.display = "none";

  let box = document.getElementById("display");
  box.innerText = "Waiting for orders...";
  box.classList.remove("glow");

  if(currentKey){
    db.ref("orders/" + currentKey).update({
      status: "cleared"
    });
  }
}

} catch(err){
  console.log("Workers error:", err);
}
</script>

</body>
</html>
